id: openenv-software-dev
name: "Software Development RL Environment"
version: "0.1.0"
description: >
  A Gymnasium-compatible reinforcement learning environment where an LLM agent
  reads code, edits files, runs tests, and receives shaped rewards for solving
  software engineering tasks (bug fixes, feature implementations).

task_domain: software_development
openenv_version: "0.1.0"

environments:
  - id: SoftwareDev-easy-v0
    difficulty: easy
    max_steps: 15
    description: "Short-horizon bug-fix and fizzbuzz tasks."

  - id: SoftwareDev-v0
    difficulty: medium
    max_steps: 30
    description: "Medium-difficulty bug fixes and feature implementations."

  - id: SoftwareDev-hard-v0
    difficulty: hard
    max_steps: 50
    description: "Hard tasks with LLM-based semantic grading."

reward_formula: "R = (tests_passed * 1.0) + (code_quality * 0.5) - (step_penalty * 0.02)"

action_space:
  type: dict
  keys:
    type: int          # ActionType enum value
    target_file: str   # path in virtual filesystem
    text_input: str    # content for WRITE_FILE

observation_space:
  type: dict
  includes:
    - task_id
    - task_description
    - file_tree
    - files
    - progress
    - last_action_status
    - last_reward
    - available_actions

baseline_scores:
  random_agent:
    success_rate: 0.02
    avg_steps: 30.0
    avg_reward: -0.60
  rule_based_agent:
    success_rate: 0.45
    avg_steps: 12.4
    avg_reward: 1.20
  gpt4o:
    success_rate: 0.88
    avg_steps: 5.2
    avg_reward: 4.50

tags:
  - code
  - bug-fix
  - feature-implementation
  - pytest
  - llm-agent
