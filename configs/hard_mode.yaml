# Hard-mode configuration — longer horizon, LLM grading, tighter penalties
env:
  difficulty: hard
  max_steps: 50
  enable_llm_grading: true
  llm_endpoint: "https://router.huggingface.co/v1/chat/completions"

reward:
  test_weight: 1.0
  quality_weight: 0.75
  step_penalty: 0.05   # steeper penalty encourages faster solutions
  terminal_weight: 8.0

grader:
  programmatic_weight: 0.6
  llm_weight: 0.4

sandbox:
  executor_timeout: 15
